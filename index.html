<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>JARVIS X | OS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:#00f3ff;
font-family:'Share Tech Mono',monospace;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
}

h1{
letter-spacing:10px;
}

.orb-container{
position:relative;
width:180px;
height:180px;
display:flex;
align-items:center;
justify-content:center;
margin:40px;
}

.orb{
width:110px;
height:110px;
background:radial-gradient(circle,#7ef9ff,#00c8d7);
border-radius:50%;
box-shadow:0 0 60px #00f3ff;
z-index:2;
transition:.3s;
}

.orb.listening{
background:#ff003c;
box-shadow:0 0 80px #ff003c;
animation:pulse 1.2s infinite;
}

.orb.speaking{
animation:ripple 1s infinite;
}

.ring{
position:absolute;
border-radius:50%;
border:2px solid #00f3ff;
}

.ring1{
width:150px;
height:150px;
opacity:.5;
animation:rotate 6s linear infinite;
}

.ring2{
width:180px;
height:180px;
border-style:dashed;
opacity:.3;
animation:rotateReverse 10s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes rotateReverse{
from{transform:rotate(360deg)}
to{transform:rotate(0deg)}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

@keyframes ripple{
0%{box-shadow:0 0 0 0 rgba(0,243,255,.6)}
100%{box-shadow:0 0 0 40px rgba(0,243,255,0)}
}

.console{
width:90%;
max-width:700px;
height:170px;
border:1px solid #00f3ff;
padding:10px;
overflow:auto;
background:black;
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
width:90%;
max-width:700px;
}

input{
flex:1;
padding:10px;
background:black;
border:1px solid #00f3ff;
color:#00f3ff;
}

button{
background:#00f3ff;
border:none;
padding:10px 20px;
cursor:pointer;
}

.status{
margin-top:20px;
font-size:12px;
}

.credit{
position:fixed;
bottom:10px;
right:20px;
font-size:11px;
opacity:.5;
}

</style>
</head>

<body>

<h1>JARVIS X</h1>

<div class="orb-container">

<div id="orb" class="orb"></div>

<div class="ring ring1"></div>

<div class="ring ring2"></div>

</div>

<div id="console" class="console">
<div>> SYSTEM READY</div>
</div>

<div class="controls">

<input type="password" id="apiKey" placeholder="ENTER OPENROUTER API KEY">

<button onclick="toggleListening()">ACTIVATE VOICE</button>

</div>

<div class="status" id="status">STATUS : STANDBY</div>

<div class="credit">SYSTEM_DEV: parikalyansrinivas</div>

<script>

const consoleEl=document.getElementById("console")
const apiKeyInput=document.getElementById("apiKey")
const statusEl=document.getElementById("status")
const orb=document.getElementById("orb")

let recognition
let isListening=false

function log(text){

const div=document.createElement("div")

div.textContent="> "+text

consoleEl.appendChild(div)

consoleEl.scrollTop=consoleEl.scrollHeight

}

function speak(text){

const utter=new SpeechSynthesisUtterance(text)

orb.className="orb speaking"

utter.onstart=()=>{
statusEl.innerText="STATUS : SPEAKING"
}

utter.onend=()=>{
orb.className="orb"
statusEl.innerText="STATUS : STANDBY"
startListening()
}

speechSynthesis.speak(utter)

}

async function getJarvisResponse(userText){

const key=apiKeyInput.value

if(!key){
speak("Please enter API key")
return
}

log("USER : "+userText)

try{

const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json",
"HTTP-Referer":window.location.href,
"X-Title":"Jarvis X"
},

body:JSON.stringify({

model:"stepfun/step-3.5-flash:free",

messages:[
{role:"system",content:"You are Jarvis X AI assistant."},
{role:"user",content:userText}
]

})

})

const data=await response.json()

let aiText="No response"

if(data.choices && data.choices.length>0){
aiText=data.choices[0].message.content
}

log("JARVIS : "+aiText)

speak(aiText)

}catch(e){

log("ERROR CONNECTING AI")

speak("Connection problem")

}

}

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(SpeechRecognition){

recognition=new SpeechRecognition()

recognition.lang="en-IN"

recognition.onstart=()=>{
isListening=true
orb.className="orb listening"
statusEl.innerText="STATUS : LISTENING"
}

recognition.onresult=(event)=>{
const text=event.results[0][0].transcript
getJarvisResponse(text)
}

recognition.onend=()=>{
isListening=false
orb.className="orb"
statusEl.innerText="STATUS : STANDBY"
}

}

function toggleListening(){

if(isListening){
recognition.stop()
}else{
startListening()
}

}

function startListening(){

if(recognition){
recognition.start()
}

}

</script>

</body>
</html>
