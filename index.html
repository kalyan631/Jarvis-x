<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS X | OS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
--primary:#00f3ff;
--bg:#050505;
--glow:rgba(0,243,255,0.4);
--danger:#ff003c;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background-color:var(--bg);
color:var(--primary);
font-family:'Share Tech Mono',monospace;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background-image:
radial-gradient(circle at 50% 50%,#111 0%,#000 100%),
linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.25) 50%),
linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06));
background-size:100% 100%,100% 2px,3px 100%;
}

#ui-container{
position:relative;
width:100%;
max-width:800px;
display:flex;
flex-direction:column;
align-items:center;
gap:2rem;
z-index:10;
}

.orb-container{
position:relative;
width:250px;
height:250px;
display:flex;
justify-content:center;
align-items:center;
}

.orb{
width:120px;
height:120px;
background:var(--primary);
border-radius:50%;
box-shadow:0 0 50px var(--primary), inset 0 0 20px #fff;
position:relative;
transition:all .3s;
}

.orb.listening{
animation:pulse 1.5s infinite;
background:var(--danger);
box-shadow:0 0 60px var(--danger);
}

.orb.speaking{
animation:ripple .8s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

@keyframes ripple{
0%{box-shadow:0 0 0 0 rgba(0,243,255,.7)}
100%{box-shadow:0 0 0 40px rgba(0,243,255,0)}
}

.ring{
position:absolute;
border:2px solid var(--primary);
border-radius:50%;
opacity:.3;
animation:rotate 10s linear infinite;
}

.ring-1{width:180px;height:180px;border-style:dashed}
.ring-2{width:220px;height:220px;border-style:double;animation-direction:reverse}

@keyframes rotate{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

#console{
width:90%;
height:150px;
background:rgba(0,0,0,.8);
border:1px solid var(--primary);
padding:15px;
overflow-y:auto;
text-transform:uppercase;
font-size:.9rem;
box-shadow:0 0 15px var(--glow);
}

.line{margin-bottom:5px}
.line span{color:#fff}

.controls{
display:flex;
gap:15px;
width:90%;
}

input{
flex:1;
background:transparent;
border:1px solid var(--primary);
padding:10px;
color:var(--primary);
font-family:'Share Tech Mono';
}

button{
background:var(--primary);
color:#000;
border:none;
padding:10px 20px;
cursor:pointer;
font-weight:bold;
}

.status{
font-size:.7rem;
letter-spacing:2px;
}

.credits{
position:fixed;
bottom:10px;
right:15px;
font-size:.7rem;
opacity:.5;
}

</style>
</head>

<body>

<div id="ui-container">

<h1 style="letter-spacing:10px;">JARVIS X</h1>

<div class="orb-container">
<div class="ring ring-1"></div>
<div class="ring ring-2"></div>
<div id="visualizer" class="orb"></div>
</div>

<div id="console">
<div class="line">> INITIALIZING SYSTEM...</div>
<div class="line">> ENCRYPTED CHANNEL ESTABLISHED.</div>
<div class="line">> READY FOR COMMANDS.</div>
</div>

<div class="controls">
<input type="password" id="apiKey" placeholder="ENTER OPENROUTER API KEY">
<button onclick="toggleListening()">ACTIVATE VOICE</button>
</div>

<div class="status" id="status">STATUS: STANDBY</div>

</div>

<div class="credits">SYSTEM_DEV: parikalyansrinivas</div>

<script>

const consoleEl=document.getElementById('console');
const visualizer=document.getElementById('visualizer');
const statusEl=document.getElementById('status');
const apiKeyInput=document.getElementById('apiKey');

let recognition;
let isListening=false;
let synthesis=window.speechSynthesis;

const SYSTEM_PROMPT=`You are Jarvis X.
Speak naturally like a friendly female assistant.
Developed by parikalyansrinivas.
Powered by OpenRouter.`;

/* FEMALE VOICE */

function getBestVoice(){

const voices=synthesis.getVoices();

const female=voices.find(v=>

v.lang.startsWith('en') &&

(v.name.toLowerCase().includes('female') ||
v.name.toLowerCase().includes('zira') ||
v.name.toLowerCase().includes('susan'))

);

return female || voices[0];

}

/* SPEAK */

function speak(text){

synthesis.cancel();

visualizer.className='orb speaking';

const utter=new SpeechSynthesisUtterance(text);

utter.voice=getBestVoice();

utter.onend=()=>{
visualizer.className='orb';
statusEl.innerText='STATUS: STANDBY';
startListening();
};

synthesis.speak(utter);

}

/* OPENROUTER AI */

async function getJarvisResponse(userText){

const key=apiKeyInput.value;

if(!key){
speak("Please enter API key.");
return;
}

logToConsole("USER: "+userText);

try{

const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":`Bearer ${key}`,
"Content-Type":"application/json",
"HTTP-Referer":window.location.href,
"X-Title":"Jarvis X"
},

body:JSON.stringify({

model:"meta-llama/llama-3-8b-instruct:free",

messages:[
{role:"system",content:SYSTEM_PROMPT},
{role:"user",content:userText}
]

})

});

const data=await response.json();

let aiText="I couldn't understand.";

if(data.choices && data.choices.length>0){
aiText=data.choices[0].message.content;
}

logToConsole("JARVIS: "+aiText);

speak(aiText);

}catch(e){

logToConsole("NETWORK ERROR");

speak("Connection problem.");

}

}

/* SPEECH RECOGNITION */

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

if(SpeechRecognition){

recognition=new SpeechRecognition();

recognition.lang="en-IN";

recognition.onstart=()=>{
isListening=true;
visualizer.className='orb listening';
statusEl.innerText='STATUS: LISTENING...';
};

recognition.onresult=(event)=>{
const text=event.results[0][0].transcript;
getJarvisResponse(text);
};

recognition.onend=()=>{
isListening=false;
visualizer.className='orb';
statusEl.innerText='STATUS: STANDBY';
};

}

/* CONTROLS */

function toggleListening(){

if(isListening){
recognition.stop();
}else{
startListening();
}

}

function startListening(){

if(recognition && !isListening){
recognition.start();
}

}

function logToConsole(msg){

const line=document.createElement('div');

line.className='line';

line.innerHTML=`> <span>${msg}</span>`;

consoleEl.appendChild(line);

consoleEl.scrollTop=consoleEl.scrollHeight;

}

window.speechSynthesis.onvoiceschanged=()=>getBestVoice();

</script>

</body>
</html>
