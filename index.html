<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS X | OS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
--primary:#00f3ff;
--bg:#050505;
--glow:rgba(0,243,255,0.4);
--danger:#ff003c;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background-color:var(--bg);
color:var(--primary);
font-family:'Share Tech Mono',monospace;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#ui-container{
position:relative;
width:100%;
max-width:800px;
display:flex;
flex-direction:column;
align-items:center;
gap:2rem;
}

.orb-container{
position:relative;
width:250px;
height:250px;
display:flex;
justify-content:center;
align-items:center;
}

.orb{
width:120px;
height:120px;
background:var(--primary);
border-radius:50%;
box-shadow:0 0 50px var(--primary), inset 0 0 20px #fff;
}

.orb.listening{
animation:pulse 1.5s infinite;
background:var(--danger);
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

#console{
width:90%;
height:150px;
background:rgba(0,0,0,0.8);
border:1px solid var(--primary);
padding:15px;
overflow-y:auto;
font-size:0.9rem;
}

.controls{
display:flex;
gap:10px;
width:90%;
}

input,select{
flex:1;
background:transparent;
border:1px solid var(--primary);
padding:10px;
color:var(--primary);
font-family:'Share Tech Mono',monospace;
}

button{
background:var(--primary);
color:#000;
border:none;
padding:10px 20px;
cursor:pointer;
font-weight:bold;
}

.status{
font-size:0.8rem;
}

.credits{
position:fixed;
bottom:10px;
right:15px;
font-size:0.7rem;
opacity:0.5;
}

</style>
</head>

<body>

<div id="ui-container">

<h1 style="letter-spacing:10px;">JARVIS X</h1>

<div class="orb-container">
<div id="visualizer" class="orb"></div>
</div>

<div id="console">
<div>> INITIALIZING SYSTEM...</div>
<div>> READY FOR COMMANDS</div>
</div>

<div class="controls">

<input type="password" id="apiKey" placeholder="ENTER OPENROUTER API KEY">

<select id="modelSelect">
<option value="google/gemini-2.0-flash-lite-preview-02-05:free">Gemini Flash</option>
<option value="meta-llama/llama-3-8b-instruct:free">Llama 3</option>
<option value="mistralai/mistral-7b-instruct:free">Mistral</option>
</select>

<button onclick="toggleListening()">ACTIVATE VOICE</button>

</div>

<div class="status" id="status">STATUS: STANDBY</div>

</div>

<div class="credits">SYSTEM_DEV: parikalyansrinivas</div>

<script>

const consoleEl=document.getElementById('console')
const visualizer=document.getElementById('visualizer')
const statusEl=document.getElementById('status')
const apiKeyInput=document.getElementById('apiKey')
const modelSelect=document.getElementById('modelSelect')

let recognition
let isListening=false
let synthesis=window.speechSynthesis

function log(msg){
const line=document.createElement("div")
line.innerHTML="> "+msg
consoleEl.appendChild(line)
consoleEl.scrollTop=consoleEl.scrollHeight
}

function speak(text){

const utter=new SpeechSynthesisUtterance(text)

utter.onstart=()=>{
statusEl.innerText="STATUS: SPEAKING"
}

utter.onend=()=>{
statusEl.innerText="STATUS: STANDBY"
startListening()
}

synthesis.speak(utter)

}

async function getJarvisResponse(userText){

const key=apiKeyInput.value

if(!key){
speak("Please enter API key")
return
}

log("USER: "+userText)

try{

const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":`Bearer ${key}`,
"Content-Type":"application/json",
"HTTP-Referer":window.location.href,
"X-Title":"Jarvis X"
},

body:JSON.stringify({

model:modelSelect.value,

messages:[
{role:"system",content:"You are Jarvis X AI assistant. Speak naturally."},
{role:"user",content:userText}
]

})

})

const data=await response.json()

let aiText="No response from AI"

if(data.choices && data.choices.length>0){
aiText=data.choices[0].message.content
}

log("JARVIS: "+aiText)

speak(aiText)

}catch(err){

log("SYSTEM ERROR")
speak("Connection problem")

}

}

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(SpeechRecognition){

recognition=new SpeechRecognition()

recognition.lang="en-IN"

recognition.onstart=()=>{
isListening=true
visualizer.classList.add("listening")
statusEl.innerText="STATUS: LISTENING"
}

recognition.onresult=(event)=>{
const text=event.results[0][0].transcript
getJarvisResponse(text)
}

recognition.onend=()=>{
isListening=false
visualizer.classList.remove("listening")
}

}

function toggleListening(){

if(isListening){
recognition.stop()
}else{
startListening()
}

}

function startListening(){

if(recognition){
recognition.start()
}

}

</script>

</body>
</html>
